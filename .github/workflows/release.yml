name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install renderer dependencies
        run: npm ci --prefix renderer

      - name: Type check
        run: npm run check

      - name: Build Windows packages
        run: npm run dist:win

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = @"
          会话管家 $tag

          - Windows 安装包：codex-session-manager-Setup-*.exe
          - Windows 便携包：codex-session-manager-Portable-*.exe
          - 更新记录来源：version.jsonl
          "@

          gh release create $tag `
            release/codex-session-manager-Setup-*.exe `
            release/codex-session-manager-Portable-*.exe `
            release/latest.yml `
            --title $tag `
            --notes $notes
